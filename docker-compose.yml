services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptohacker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cryptohacker
      POSTGRES_PASSWORD: cryptohacker
      POSTGRES_DB: cryptohacker
    ports:
      - "5432:5432"
    volumes:
      - cryptohacker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptohacker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cryptohacker_pgdata:
